name: NuGet Pack & Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.3
        with:
          versionSpec: 6.x

      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.3

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.fullSemVer }}

      # - name: Pack Kaufland.SellerApi.Core
      #   run: |
      #     dotnet pack src/Kaufland.SellerApi.Core/Kaufland.SellerApi.Core.csproj \
      #       --configuration Release \
      #       --no-build \
      #       --output ./artifacts/nupkg \
      #       /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      # - name: Pack Kaufland.SellerApi
      #   run: |
      #     dotnet pack src/Kaufland.SellerApi/Kaufland.SellerApi.csproj \
      #       --configuration Release \
      #       --no-build \
      #       --output ./artifacts/nupkg \
      #       /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: Pack Kaufland.SellerApi.Extensions.DependencyInjection
        run: |
          dotnet pack src/Kaufland.SellerApi.Extensions.DependencyInjection/Kaufland.SellerApi.Extensions.DependencyInjection.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts/nupkg \
            /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      # NuGet trusted publishing login
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: contoso-bot
          
      - name: Push packages to NuGet
        run: |
          dotnet nuget push "./artifacts/nupkg/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
