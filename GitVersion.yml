mode: ContinuousDelivery

tag-prefix: '[vV]'

branches:

  main:
    regex: ^main$
    increment: Patch
    prevent-increment:
      of-merged-branch: true
    label: ''

  feature:
    regex: ^feature(s)?[/-]
    increment: Minor
    label: alpha

  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    label: beta

  pull-request:
    regex: ^(pull|pr)[/-]
    increment: Patch
    label: pr